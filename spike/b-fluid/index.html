<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Spike B — fluid sim perf</title>
  <style>
    * { margin: 0; }
    html, body { height: 100%; background: #0c0e0e; overflow: hidden; }
    /* A lib cria o <canvas> dentro do container e o estica a 100%. */
    #fluid { width: 100%; height: 100%; }
    canvas { display: block; }
    #hud {
      position: fixed; top: 8px; left: 8px; z-index: 10;
      color: #7effb6; font: 13px monospace; background: #000; padding: 6px 10px;
    }
  </style>
</head>
<body>
  <script>
    // Debug em dispositivo sem devtools: qualquer erro vira texto na tela.
    function showErr(msg) {
      const pre = document.createElement('pre');
      pre.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:99;background:#400;color:#fff;padding:8px;font-size:11px;white-space:pre-wrap;margin:0';
      pre.textContent = msg;
      document.body.appendChild(pre);
    }
    addEventListener('error', function (e) {
      showErr('ERRO: ' + (e.message || e.type) + '\n' + (e.filename || '') + ':' + (e.lineno || ''));
    });
    addEventListener('unhandledrejection', function (e) {
      showErr('PROMISE: ' + ((e.reason && (e.reason.stack || e.reason.message)) || e.reason));
    });
  </script>
  <div id="fluid"></div>
  <div id="hud">fps: <span id="fps">–</span></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
