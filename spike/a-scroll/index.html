<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Spike A — Lenis × scroll-timeline × ScrollTrigger</title>
  <style>
    @property --p {
      syntax: '<number>';
      inherits: false;
      initial-value: 0;
    }

    * { margin: 0; box-sizing: border-box; }
    body { background: #0c0e0e; color: #e8f2ec; font-family: monospace; }

    /* A prova: --p é dirigida pelo scroll, sem uma linha de JS. */
    #native {
      --p: 0;
      animation: drive linear both;
      animation-timeline: scroll(root block);
    }
    @keyframes drive {
      from { --p: 0; }
      to   { --p: 1; }
    }

    #readout {
      position: fixed; top: 12px; left: 12px; z-index: 10;
      background: #000; padding: 10px 14px; font-size: 13px; line-height: 1.6;
    }

    .spacer { height: 300vh; display: grid; place-items: center; font-size: 24px; }

    /* Seção do GSAP: pin + scrub */
    #pin-wrap { height: 300vh; }
    #pin { height: 100vh; display: grid; place-items: center; }
    #box { width: 120px; height: 120px; background: #7effb6; }
  </style>
</head>
<body>
  <div id="native"></div>
  <div id="readout">--p: <span id="p">?</span><br />scrollY: <span id="y">?</span></div>

  <div class="spacer">Role. A caixa de leitura mostra --p vindo do CSS nativo.</div>

  <div id="pin-wrap">
    <div id="pin"><div id="box"></div></div>
  </div>

  <div class="spacer">Fim.</div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
